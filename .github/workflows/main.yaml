name: Python Quality and Security Checks

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  quality-and-security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit ruff
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Compile Python files (Syntax Check)
      run: python -m compileall

    - name: Run Linting (ruff)
      run: ruff check .

    - name: Run Security Check (Bandit)
      run: bandit -r app

    - name: Run Dependency Audit (pip-audit)
      run: pip-audit -r requirements.txt -f json -o audit.json

    - name: Upload Audit Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: audit-report
        path: audit.json
